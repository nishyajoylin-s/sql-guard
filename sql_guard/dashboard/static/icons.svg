<svg xmlns="http://www.w3.org/2000/svg" style="display:none">

  <!-- dm-overview: real dashboard layout — wide top panel + two bottom panels -->
  <symbol id="dm-overview" viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <rect x="3" y="3" width="18" height="8" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
    <rect x="3" y="13" width="8" height="8" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
    <rect x="13" y="13" width="8" height="8" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
  </symbol>

  <!-- dm-pipeline: source node → process box → destination node -->
  <symbol id="dm-pipeline" viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="4.5" cy="12" r="2.5" stroke="currentColor" stroke-width="1.5"/>
    <rect x="9" y="9.5" width="6" height="5" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
    <circle cx="19.5" cy="12" r="2.5" stroke="currentColor" stroke-width="1.5"/>
    <line x1="7" y1="12" x2="9" y2="12" stroke="currentColor" stroke-width="1.5"/>
    <line x1="15" y1="12" x2="17" y2="12" stroke="currentColor" stroke-width="1.5"/>
  </symbol>

  <!-- dm-query: magnifier with code brackets inside -->
  <symbol id="dm-query" viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="10" cy="10" r="7" stroke="currentColor" stroke-width="1.5"/>
    <line x1="15.5" y1="15.5" x2="21" y2="21" stroke="currentColor" stroke-width="1.5"/>
    <path d="M8 8 L6.5 10 L8 12" stroke="currentColor" stroke-width="1.3"/>
    <path d="M12 8 L13.5 10 L12 12" stroke="currentColor" stroke-width="1.3"/>
  </symbol>

  <!-- dm-source: three stacked data layers -->
  <symbol id="dm-source" viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <ellipse cx="12" cy="7" rx="8" ry="2.5" stroke="currentColor" stroke-width="1.5"/>
    <path d="M4 7 L4 12" stroke="currentColor" stroke-width="1.5"/>
    <path d="M20 7 L20 12" stroke="currentColor" stroke-width="1.5"/>
    <ellipse cx="12" cy="12" rx="8" ry="2.5" stroke="currentColor" stroke-width="1.5"/>
    <path d="M4 12 L4 17" stroke="currentColor" stroke-width="1.5"/>
    <path d="M20 12 L20 17" stroke="currentColor" stroke-width="1.5"/>
    <ellipse cx="12" cy="17" rx="8" ry="2.5" stroke="currentColor" stroke-width="1.5"/>
  </symbol>

  <!-- dm-insight: ascending bars with accent dot on peak -->
  <symbol id="dm-insight" viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <rect x="3" y="15" width="4" height="6" rx="1" stroke="currentColor" stroke-width="1.5"/>
    <rect x="10" y="10" width="4" height="11" rx="1" stroke="currentColor" stroke-width="1.5"/>
    <rect x="17" y="5" width="4" height="16" rx="1" stroke="currentColor" stroke-width="1.5"/>
    <circle cx="19" cy="3.5" r="1.5" fill="currentColor"/>
  </symbol>

  <!-- dm-alert: clean bell silhouette -->
  <symbol id="dm-alert" viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M5 10 C5 6.13 8.13 3 12 3 C15.87 3 19 6.13 19 10 L19 15 L21 17 L3 17 L5 15 Z" stroke="currentColor" stroke-width="1.5"/>
    <path d="M10 17 C10 18.1 10.9 19 12 19 C13.1 19 14 18.1 14 17" stroke="currentColor" stroke-width="1.5"/>
  </symbol>

  <!-- dm-settings: three horizontal sliders (controls) — split around handle -->
  <symbol id="dm-settings" viewBox="0 0 24 24" fill="none" stroke-linecap="round">
    <line x1="3" y1="6" x2="6.5" y2="6" stroke="currentColor" stroke-width="1.5"/>
    <circle cx="9" cy="6" r="2.5" stroke="currentColor" stroke-width="1.5"/>
    <line x1="11.5" y1="6" x2="21" y2="6" stroke="currentColor" stroke-width="1.5"/>
    <line x1="3" y1="12" x2="12.5" y2="12" stroke="currentColor" stroke-width="1.5"/>
    <circle cx="15" cy="12" r="2.5" stroke="currentColor" stroke-width="1.5"/>
    <line x1="17.5" y1="12" x2="21" y2="12" stroke="currentColor" stroke-width="1.5"/>
    <line x1="3" y1="18" x2="5.5" y2="18" stroke="currentColor" stroke-width="1.5"/>
    <circle cx="8" cy="18" r="2.5" stroke="currentColor" stroke-width="1.5"/>
    <line x1="10.5" y1="18" x2="21" y2="18" stroke="currentColor" stroke-width="1.5"/>
  </symbol>

  <!-- dm-user: head + arc -->
  <symbol id="dm-user" viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="8" r="3.5" stroke="currentColor" stroke-width="1.5"/>
    <path d="M4 20 C4 16.5 7.6 13.5 12 13.5 C16.4 13.5 20 16.5 20 20" stroke="currentColor" stroke-width="1.5"/>
  </symbol>

  <!-- dm-filter: clean funnel -->
  <symbol id="dm-filter" viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M4 4 L20 4 L14 12 L14 20 L10 22 L10 12 Z" stroke="currentColor" stroke-width="1.5"/>
  </symbol>

  <!-- dm-live: EKG / heartbeat wave -->
  <symbol id="dm-live" viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="2,12 5,12 7,5 10,19 13,10 15,14 17,12 22,12" stroke="currentColor" stroke-width="1.5" fill="none"/>
  </symbol>

  <!-- dm-check: bold checkmark -->
  <symbol id="dm-check" viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M4 13 L9.5 18.5 L20 7" stroke="currentColor" stroke-width="2"/>
  </symbol>

  <!-- dm-close: X -->
  <symbol id="dm-close" viewBox="0 0 24 24" fill="none" stroke-linecap="round">
    <line x1="6" y1="6" x2="18" y2="18" stroke="currentColor" stroke-width="1.5"/>
    <line x1="18" y1="6" x2="6" y2="18" stroke="currentColor" stroke-width="1.5"/>
  </symbol>

  <!-- dm-warning: triangle with line + dot -->
  <symbol id="dm-warning" viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 3 L22 21 L2 21 Z" stroke="currentColor" stroke-width="1.5"/>
    <line x1="12" y1="10" x2="12" y2="15" stroke="currentColor" stroke-width="1.5"/>
    <circle cx="12" cy="18" r="0.8" fill="currentColor"/>
  </symbol>

  <!-- dm-info: circle with i -->
  <symbol id="dm-info" viewBox="0 0 24 24" fill="none" stroke-linecap="round">
    <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.5"/>
    <line x1="12" y1="11" x2="12" y2="17" stroke="currentColor" stroke-width="2"/>
    <circle cx="12" cy="7.5" r="0.8" fill="currentColor"/>
  </symbol>

  <!-- dm-plus -->
  <symbol id="dm-plus" viewBox="0 0 24 24" fill="none" stroke-linecap="round">
    <line x1="12" y1="5" x2="12" y2="19" stroke="currentColor" stroke-width="1.5"/>
    <line x1="5" y1="12" x2="19" y2="12" stroke="currentColor" stroke-width="1.5"/>
  </symbol>

  <!-- dm-export: arrow up from tray -->
  <symbol id="dm-export" viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 3 L12 15" stroke="currentColor" stroke-width="1.5"/>
    <path d="M8 7 L12 3 L16 7" stroke="currentColor" stroke-width="1.5"/>
    <path d="M4 17 L4 21 L20 21 L20 17" stroke="currentColor" stroke-width="1.5"/>
  </symbol>

  <!-- dm-refresh: two arc arrows -->
  <symbol id="dm-refresh" viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M4 12 A8 8 0 0 1 18 6.3 L15 6" stroke="currentColor" stroke-width="1.5"/>
    <path d="M20 12 A8 8 0 0 1 6 17.7 L9 18" stroke="currentColor" stroke-width="1.5"/>
  </symbol>

  <!-- dm-trend-up: line chart going up with arrow cap -->
  <symbol id="dm-trend-up" viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M3 17 L8 12 L13 15 L21 7" stroke="currentColor" stroke-width="1.5"/>
    <path d="M15 7 L21 7 L21 13" stroke="currentColor" stroke-width="1.5"/>
  </symbol>

  <!-- dm-trend-down: line chart going down with arrow cap -->
  <symbol id="dm-trend-down" viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M3 7 L8 12 L13 9 L21 17" stroke="currentColor" stroke-width="1.5"/>
    <path d="M15 17 L21 17 L21 11" stroke="currentColor" stroke-width="1.5"/>
  </symbol>

</svg>
